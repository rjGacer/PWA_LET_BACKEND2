<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <style>
      .icon-bg { fill: #312e81; }
      .icon-primary { fill: #4f46e5; }
      .icon-accent { fill: #ffffff; }
    </style>
  </defs>
  <rect class="icon-bg" width="192" height="192"/>
  
  <!-- Book/Learning icon -->
  <g transform="translate(48, 48)">
    <!-- Book spine -->
    <rect class="icon-primary" x="38" y="12" width="32" height="84"/>
    <!-- Left page -->
    <rect class="icon-accent" x="16" y="16" width="38" height="76"/>
    <!-- Right page -->
    <rect class="icon-accent" x="54" y="16" width="38" height="76"/>
    <!-- Text lines on left -->
    <line x1="22" y1="28" x2="48" y2="28" stroke="#e0e7ff" stroke-width="2"/>
    <line x1="22" y1="38" x2="48" y2="38" stroke="#e0e7ff" stroke-width="2"/>
    <line x1="22" y1="48" x2="48" y2="48" stroke="#e0e7ff" stroke-width="2"/>
    <!-- Text lines on right -->
    <line x1="60" y1="28" x2="86" y2="28" stroke="#e0e7ff" stroke-width="2"/>
    <line x1="60" y1="38" x2="86" y2="38" stroke="#e0e7ff" stroke-width="2"/>
    <line x1="60" y1="48" x2="86" y2="48" stroke="#e0e7ff" stroke-width="2"/>
  </g>
</svg>