<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .icon-bg { fill: #312e81; }
      .icon-primary { fill: #4f46e5; }
      .icon-accent { fill: #ffffff; }
    </style>
  </defs>
  <rect class="icon-bg" width="512" height="512"/>
  
  <!-- Book/Learning icon -->
  <g transform="translate(128, 128)">
    <!-- Book spine -->
    <rect class="icon-primary" x="102" y="32" width="85" height="224"/>
    <!-- Left page -->
    <rect class="icon-accent" x="43" y="43" width="102" height="202"/>
    <!-- Right page -->
    <rect class="icon-accent" x="145" y="43" width="102" height="202"/>
    <!-- Text lines on left -->
    <line x1="59" y1="75" x2="128" y2="75" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="59" y1="102" x2="128" y2="102" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="59" y1="129" x2="128" y2="129" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="59" y1="156" x2="128" y2="156" stroke="#e0e7ff" stroke-width="5"/>
    <!-- Text lines on right -->
    <line x1="161" y1="75" x2="230" y2="75" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="161" y1="102" x2="230" y2="102" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="161" y1="129" x2="230" y2="129" stroke="#e0e7ff" stroke-width="5"/>
    <line x1="161" y1="156" x2="230" y2="156" stroke="#e0e7ff" stroke-width="5"/>
  </g>
</svg>