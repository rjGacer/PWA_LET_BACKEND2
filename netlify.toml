# Netlify Configuration for PWA LET Frontend
# Supports both standalone Netlify frontend + external backend and same-domain deployment

[build]
# Directory to deploy (root contains all frontend files)
publish = "."
# Optional: Uncomment if you have a build step (npm, webpack, etc.)
# command = "npm run build"

# Environment settings
[build.environment]
NODE_ENV = "production"

# Production context
[context.production]
[context.production.environment]
# Configure your backend API URL for production
# Options:
# 1. External backend: BACKEND_URL = "https://api.example.com/api/v1"
# 2. Same-domain (proxied): Leave empty or use relative /api/v1
BACKEND_URL = "https://your-backend-api.com/api/v1"

# Branch deployments (staging)
[context.branch-deploy]
[context.branch-deploy.environment]
BACKEND_URL = "https://staging-api.example.com/api/v1"

# Deploy previews
[context.deploy-preview]
[context.deploy-preview.environment]
BACKEND_URL = "https://dev-api.example.com/api/v1"

# SPA routing - all routes go to index.html
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
condition = "!{path.startsWith('/api')} && !{path.startsWith('/assets')} && !{path.startsWith('/student/')} && !{path.startsWith('/teacher/')} && {path.endsWith('.html')}"

# IMPORTANT: If your backend is on a different domain, configure CORS in your backend
# If backend is on same domain, configure API proxying in Netlify Functions or use Netlify CLI

# API Proxy for same-domain setup (Uncomment if backend is served from same domain)
# [[redirects]]
# from = "/api/v1/*"
# to = "http://localhost:5000/api/v1/:splat"  # For local development
# status = 200
# force = false

# Alternative: Use Netlify Functions for API proxy
# See: https://docs.netlify.com/functions/overview/

# Headers for PWA and security
[[headers]]
path = "/*"
[headers.values]
  # PWA support
  "Cache-Control" = "no-cache"
  "X-Content-Type-Options" = "nosniff"
  "X-Frame-Options" = "SAMEORIGIN"
  "X-XSS-Protection" = "1; mode=block"

# Service Worker - no cache
[[headers]]
path = "/sw.js"
[headers.values]
  "Cache-Control" = "no-cache, no-store, must-revalidate"
  "Content-Type" = "application/javascript"

# Static assets - cache long-term
[[headers]]
path = "/assets/*"
[headers.values]
  "Cache-Control" = "public, max-age=31536000, immutable"

# Manifest and index - no cache
[[headers]]
path = "/manifest.json"
[headers.values]
  "Cache-Control" = "no-cache, no-store, must-revalidate"
  "Content-Type" = "application/manifest+json"

[[headers]]
path = "/index.html"
[headers.values]
  "Cache-Control" = "no-cache, no-store, must-revalidate"
  "Content-Type" = "text/html; charset=utf-8"
for = "/*"
[headers.values]
# Cache control for HTML files (don't cache, check for updates)
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
# Cache assets for 1 year (content-hashed filenames)
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/manifest.json"
[headers.values]
Content-Type = "application/manifest+json"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.js"
[headers.values]
Content-Type = "application/javascript"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.css"
[headers.values]
Content-Type = "text/css"
Cache-Control = "public, max-age=3600"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

# Allow CORS for API calls (if backend is separate domain)
[[headers]]
for = "/api/*"
[headers.values]
Access-Control-Allow-Origin = "*"
Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
Access-Control-Allow-Headers = "Content-Type, Authorization"
