# Netlify Configuration for LearnIQ PWA Frontend
# IMPORTANT: Use "for" (not "path") for all [[headers]] sections

[build]
publish = "."
command = ""

[build.environment]
NODE_ENV = "production"

# Production environment
[context.production.environment]
BACKEND_URL = "https://pwa-let-reviewer.onrender.com/api/v1"

# SPA routing - redirect all routes to index.html EXCEPT static assets
# Exclude static assets from SPA redirect
[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200

[[redirects]]
from = "/js/*"
to = "/js/:splat"
status = 200

[[redirects]]
from = "/css/*"
to = "/css/:splat"
status = 200

[[redirects]]
from = "/*.js"
to = "/:splat.js"
status = 200

[[redirects]]
from = "/*.json"
to = "/:splat.json"
status = 200

[[redirects]]
from = "/*.css"
to = "/:splat.css"
status = 200

# SPA routing - redirect all other routes to index.html
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache headers
[[headers]]
for = "/*"
[headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "SAMEORIGIN"

[[headers]]
for = "/assets/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/sw.js"
[headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Content-Type = "application/javascript"

[[headers]]
for = "/manifest.json"
[headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Content-Type = "application/manifest+json"

[[headers]]
for = "/index.html"
[headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Content-Type = "text/html; charset=utf-8"
