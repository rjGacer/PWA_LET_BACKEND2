<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnIQ Sidebar + Header</title>

  <!-- Remix Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #f5f5f7;
      color: #202124;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* =========================
       SIDEBAR
    ========================== */
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 1px solid #ececec;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px 16px;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* LOGO */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .logo h2 {
      font-size: 26px;
      font-weight: 700;
    }

    .logo span {
      color: #5b4ffb;
    }

    /* NAVIGATION */
    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
    }

    .nav-link {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: #444;
      font-size: 14px;
      font-weight: 500;
      transition: 0.25s ease;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    .nav-link-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link i {
      font-size: 18px;
    }

    .nav-link:hover {
      background: #f4f2ff;
      color: #5b4ffb;
    }

    .nav-link.active {
      background: linear-gradient(90deg, #5b4ffb, #6949ff);
      color: white;
      box-shadow: 0 6px 18px rgba(91, 79, 251, 0.25);
    }

    /* DROPDOWN */
    .submenu {
      margin-top: 6px;
      margin-left: 18px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }

    .submenu.show {
      display: flex;
    }

    .submenu a {
      text-decoration: none;
      color: #555;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .submenu a:hover {
      background: #f4f2ff;
      color: #5b4ffb;
    }

    /* PROMO CARD */
    .promo-card {
      background: linear-gradient(180deg, #5b4ffb, #7367ff);
      border-radius: 20px;
      padding: 22px 18px;
      text-align: center;
      color: white;
      margin-top: 20px;
    }

    .promo-card .cloud {
      width: 70px;
      height: 70px;
      margin: auto;
      margin-bottom: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    .promo-card h4 {
      font-size: 15px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .promo-card p {
      font-size: 12px;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .sync-btn {
      border: none;
      background: white;
      color: #5b4ffb;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .sync-btn:hover {
      transform: translateY(-1px);
    }

    /* SIDEBAR BOTTOM */
    .sidebar-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 22px;
    }

    .bottom-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      text-decoration: none;
      border-radius: 12px;
      color: #444;
      font-size: 14px;
      transition: 0.2s;
    }

    .bottom-link:hover {
      background: #f4f2ff;
      color: #5b4ffb;
    }

    /* =========================
       MAIN AREA
    ========================== */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      height: 78px;
      background: #ffffff;
      border-bottom: 1px solid #ececec;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .menu-toggle {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      background: #f5f5ff;
      color: #5b4ffb;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-toggle:hover {
      background: #ece9ff;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #202124;
    }

    /* RIGHT SIDE */
    .header-right {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    /* Notification */
    .notification {
      position: relative;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #f5f5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5b4ffb;
      cursor: pointer;
      transition: 0.2s;
    }

    .notification:hover {
      background: #ece9ff;
    }

    .notification i {
      font-size: 20px;
    }

    .notification-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4d67;
      border: 2px solid white;
    }

    /* PROFILE */
    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .profile-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5b4ffb, #7c72ff);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 16px;
    }

    .profile-info h4 {
      font-size: 14px;
      font-weight: 600;
      color: #202124;
    }

    .profile-info p {
      font-size: 12px;
      color: #777;
      margin-top: 2px;
    }

    .profile i {
      color: #777;
      font-size: 18px;
    }

    /* CONTENT */
    .content {
      padding: 30px;
    }

    .content-box {
      background: white;
      border-radius: 22px;
      min-height: 500px;
      border: 1px solid #ececec;
      padding: 30px;
    }

    .content-box h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .content-box p {
      color: #666;
      font-size: 15px;
      line-height: 1.7;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        height: 100%;
        z-index: 1000;
        transition: 0.3s ease;
      }

      .sidebar.show-sidebar {
        left: 0;
      }

      .header {
        padding: 0 18px;
      }

      .profile-info {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-top">

      <!-- LOGO -->
      <div class="logo">
        <div class="logo-icon">
          <i class="ri-graduation-cap-fill"></i>
        </div>

        <h2>Learn<span>IQ</span></h2>
      </div>

      <!-- NAVIGATION -->
      <nav class="nav-menu">

        <!-- Dashboard -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <div class="nav-link-left">
              <i class="ri-home-5-line"></i>
              <span>Dashboard</span>
            </div>
          </a>
        </div>

        <!-- Categories -->
        <div class="nav-item">

          <button class="nav-link dropdown-btn">
            <div class="nav-link-left">
              <i class="ri-stack-line"></i>
              <span>Categories</span>
            </div>

            <i class="ri-arrow-down-s-line arrow"></i>
          </button>

          <div class="submenu show">
            <a href="#">Subjects</a>
            <a href="#">Modules/LMS</a>
            <a href="#">Quizzes</a>
          </div>

        </div>

        <!-- Student Performance -->
        <div class="nav-item">
          <a href="#" class="nav-link">
            <div class="nav-link-left">
              <i class="ri-bar-chart-grouped-line"></i>
              <span>Student Performance</span>
            </div>
          </a>
        </div>

      </nav>

      <!-- PROMO CARD -->
      <div class="promo-card">

        <div class="cloud">
          <i class="ri-upload-cloud-2-fill"></i>
        </div>

        <h4>Keep content updated</h4>

        <p>
          Push new updates to students’ devices.
        </p>

        <button class="sync-btn">
          Sync Now
        </button>

      </div>

    </div>

    <!-- BOTTOM -->
    <div class="sidebar-bottom">

      <a href="#" class="bottom-link">
        <i class="ri-settings-3-line"></i>
        <span>Settings</span>
      </a>

      <a href="#" class="bottom-link">
        <i class="ri-logout-box-r-line"></i>
        <span>Logout</span>
      </a>

    </div>

  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">

    <!-- HEADER -->
    <header class="header">

      <!-- LEFT -->
      <div class="header-left">

       

        <h1 class="page-title">Subjects</h1>

      </div>

      <!-- RIGHT -->
      <div class="header-right">

        <!-- Notification -->
        <div class="notification">
          <i class="ri-notification-3-line"></i>
          <span class="notification-badge"></span>
        </div>

        <!-- Profile -->
        <div class="profile">

          <div class="profile-avatar">
            T
          </div>

          <div class="profile-info">
            <h4>Teacher Name</h4>
            <p>Admin</p>
          </div>

          <!-- <i class="ri-arrow-down-s-line"></i> -->

        </div>

      </div>

    </header>

    <!-- CONTENT -->
    <!-- <main class="content">

      <div class="content-box">

        <h2>Subjects</h2>

        <p>
          Your content goes here.
        </p>

      </div>

    </main> -->

  </div>

</div>

<script>
  // Dropdown
  const dropdownBtn = document.querySelector(".dropdown-btn");
  const submenu = document.querySelector(".submenu");

  dropdownBtn.addEventListener("click", () => {
    submenu.classList.toggle("show");
  });

  // Mobile Sidebar
  const sidebar = document.getElementById("sidebar");
  const menuToggle = document.getElementById("menuToggle");

  menuToggle.addEventListener("click", () => {
    sidebar.classList.toggle("show-sidebar");
  });
</script>

</body>
</html>
