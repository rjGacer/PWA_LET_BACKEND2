services:
  # Frontend Service - Static Site
  - type: static_site
    name: pwa-let-frontend
    buildCommand: node build.js
    staticPublishPath: .
    envVars:
      - key: BACKEND_URL
        value: https://pwa-let-backend.onrender.com/api/v1

  # Backend Service - Node.js API
  - type: web
    name: pwa-let-backend
    env: node
    plan: free
    root: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        fromBuild: true
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: ballast.proxy.rlwy.net
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: pwa_let_db
      - key: DB_PORT
        value: 34315
      - key: CORS_ORIGIN
        value: https://pwa-let-frontend.onrender.com,http://localhost:3000,http://127.0.0.1:3000
      - key: JWT_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 10485760
