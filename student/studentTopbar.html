<div class="topbar">

  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Search modules, quizzes...">
  </div>

  <div class="top-right">

    <div class="notification-container">
      <button class="notification-bell" id="notificationBell" title="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="notification-badge" style="display: none;">0</span>
      </button>

      <div class="notification-dropdown" id="notificationDropdown">
        <div class="notification-header">
          <h3>Notifications</h3>
          <button class="clear-btn" id="clearAllBtn" title="Mark all as read">
            <i class="fa-solid fa-check-double"></i>
          </button>
        </div>

        <div class="notification-list" id="notificationList">
          <div class="empty-state">
            <i class="fa-regular fa-bell-slash"></i>
            <p>No notifications yet</p>
          </div>
        </div>

        <div class="notification-footer">
          <a href="../student/studentSettings.html" class="view-all-link">
            Notification Settings
          </a>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
  // Load student profile info for topbar - more robust version
  async function loadTopbarProfile() {
    try {
      const nameElement = document.getElementById('topbarStudentName');
      const picElement = document.getElementById('topbarProfilePic');

      // Try to use ApiService if available
      if (typeof ApiService !== 'undefined') {
        try {
          const api = new ApiService();
          const data = await api.request('/students/me');
          
          if (data && data.name) {
            // Show only first name
            const firstName = data.name.trim().split(' ')[0];
            nameElement.textContent = firstName;
          }

          if (data && data.profile_picture) {
            picElement.src = data.profile_picture;
          } else if (data && data.name) {
            const avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(data.name) + '&background=2f49e0&color=fff&size=40';
            picElement.src = avatarUrl;
          }
          return;
        } catch (apiError) {
          console.warn('ApiService failed, trying direct fetch:', apiError.message);
        }
      }

      // Fallback: Try direct fetch if ApiService not available
      const token = localStorage.getItem('authToken') || localStorage.getItem('auth_token') || localStorage.getItem('token');
      if (!token) {
        console.warn('No auth token found');
        return;
      }

      const protocol = window.location.protocol;
      const hostname = window.location.hostname;
      const response = await fetch(`${protocol}//${hostname}:5000/api/v1/students/me`, {
        method: 'GET',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        }
      });

      if (!response.ok) {
        console.warn('Could not load student profile, status:', response.status);
        return;
      }

      const data = await response.json();

      if (data.name) {
        // Show only first name
        const firstName = data.name.trim().split(' ')[0];
        nameElement.textContent = firstName;
      }

      if (data.profile_picture) {
        picElement.src = data.profile_picture;
      } else {
        const avatarUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(data.name || 'User') + '&background=2f49e0&color=fff&size=40';
        picElement.src = avatarUrl;
      }
    } catch (error) {
      console.warn('Error loading topbar profile:', error);
    }
  }

  // Load profile when DOM is ready, with a slight delay to ensure scripts are loaded
  function initTopbarProfile() {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(loadTopbarProfile, 100);
      });
    } else {
      setTimeout(loadTopbarProfile, 100);
    }
  }

  // Call immediately
  initTopbarProfile();

  // Also try loading after a short delay if it fails
  setTimeout(() => {
    const nameElement = document.getElementById('topbarStudentName');
    if (nameElement && nameElement.textContent === 'Student Name') {
      loadTopbarProfile();
    }
  }, 2000);

  /**
   * Notification Dropdown Handler
   */
  (function initNotificationDropdown() {
    const notificationBell = document.getElementById('notificationBell');
    const notificationDropdown = document.getElementById('notificationDropdown');
    const notificationList = document.getElementById('notificationList');
    const clearAllBtn = document.getElementById('clearAllBtn');

    if (!notificationBell || !notificationDropdown) return;

    // Toggle dropdown on bell click
    notificationBell.addEventListener('click', (e) => {
      e.stopPropagation();
      notificationDropdown.classList.toggle('active');
      if (notificationDropdown.classList.contains('active')) {
        renderNotifications();
      }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.notification-container')) {
        notificationDropdown.classList.remove('active');
      }
    });

    // Clear all button
    if (clearAllBtn) {
      clearAllBtn.addEventListener('click', async () => {
        if (typeof notificationManager !== 'undefined') {
          await notificationManager.markAllAsRead();
          renderNotifications();
        }
      });
    }

    // Render notifications in dropdown
    function renderNotifications() {
      if (typeof notificationManager === 'undefined') {
        console.warn('NotificationManager not loaded yet');
        return;
      }

      const notifications = notificationManager.notifications || [];

      if (notifications.length === 0) {
        notificationList.innerHTML = `
          <div class="empty-state">
            <i class="fa-regular fa-bell-slash"></i>
            <p>No notifications yet</p>
          </div>
        `;
        return;
      }

      notificationList.innerHTML = notifications
        .slice(0, 5) // Show only last 5
        .map((notif) => `
          <div class="notification-item ${notif.isRead ? 'read' : 'unread'}" data-id="${notif.id}" style="cursor: pointer;">
            <div class="notification-icon">${notif.icon || '📌'}</div>
            <div class="notification-content">
              <h4>${notif.title}</h4>
              <p>${notif.message}</p>
              <small>${formatTime(notif.timestamp)}</small>
            </div>
            <button class="notification-delete" onclick="event.stopPropagation(); deleteNotification(${notif.id})" title="Delete">
              <i class="fa-solid fa-times"></i>
            </button>
          </div>
        `).join('');

      // Add click handlers to notification items
      document.querySelectorAll('.notification-item').forEach(item => {
        item.addEventListener('click', async (e) => {
          if (!e.target.closest('.notification-delete')) {
            const notifId = parseInt(item.dataset.id);
            if (typeof notificationManager !== 'undefined') {
              await notificationManager.markAsRead(notifId);
              item.classList.add('read');
              renderNotifications();
            }
          }
        });
      });
    }

    // Format timestamp to relative time
    function formatTime(timestamp) {
      const now = Date.now();
      const diff = now - timestamp;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      
      return new Date(timestamp).toLocaleDateString();
    }

    // Global delete function
    window.deleteNotification = async function(notifId) {
      if (typeof notificationManager !== 'undefined') {
        await notificationManager.deleteNotification(notifId);
        renderNotifications();
      }
    };

    // Listen for notification updates
    window.addEventListener('notificationsUpdated', () => {
      if (notificationDropdown.classList.contains('active')) {
        renderNotifications();
      }
    });

    // Initial render after a delay to ensure NotificationManager is ready
    setTimeout(renderNotifications, 500);
  })();
</script>
